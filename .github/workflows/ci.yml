name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  COMPOSE_FILE: docker-compose.yml:docker-compose.ci.yml
  WEAVIATE_HYBRID_ALPHA: "0.7"
  QUERY_DEFAULTS_LIMIT: "20"
  LOCAL_EMBEDDING_MODEL: BAAI/bge-m3
  LOCAL_RERANKER_MODEL: BAAI/bge-reranker-v2-m3
  EMBEDDING_DEVICE: cpu
  RERANKER_DEVICE: cpu
  SELKIES_CLIPBOARD_ENABLED: "true"
  SELKIES_CLIPBOARD_BRIDGE_ENABLED: "true"
  SELKIES_GAMEPAD_ENABLED: "false"
  SELKIES_UI_SIDEBAR_SHOW_GAMEPADS: "false"
  SELKIES_UI_SIDEBAR_SHOW_GAMING_MODE: "false"
  SELKIES_UI_SIDEBAR_SHOW_SHARING: "false"
  SELKIES_UI_SIDEBAR_SHOW_APPS: "false"

jobs:
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build

  tests:
    name: Test suite
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run Docker test runner
        run: ./run_tests.sh

      - name: Stop test services
        if: always()
        run: docker compose -p askpdf-test -f docker-compose.test.yml down --volumes --remove-orphans
