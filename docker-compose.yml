services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_RAG_API_URL=http://localhost:8001
      - NEXT_PUBLIC_DEFAULT_EMBED_MODEL=sentence-transformers/all-mpnet-base-v2
    depends_on:
      backend:
        condition: service_healthy
      rag-service:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - /app/node_modules
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - RAG_SERVICE_URL=http://rag-service:8000
      # Docling Tuning Options (Accuracy vs Speed)
      - DOCLING_DO_OCR=True # OCRs images/scans, preserves digital text.
      - DOCLING_DO_TABLE_STRUCTURE=True
      - DOCLING_TABLE_MODE=ACCURATE # ACCURATE is better for tables but slower.
      - DOCLING_FORCE_FULL_PAGE_OCR=False # KEEP FALSE for digital PDFs to avoid noise and degradation.
      - DOCLING_DO_FORMULA_ENRICHMENT=False
    depends_on:
      rag-service:
        condition: service_healthy
      tei-embed:
        condition: service_healthy
      tei-rerank:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - pdf_data:/static
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s

  rag-service:
    build:
      context: .
      dockerfile: rag_service/Dockerfile
      args:
        DOWNLOAD_LOCAL_MODELS: "false"
    ports:
      - "8001:8000"
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - DATA_DIR=/data
      - BACKEND_URL=http://backend:8000
      - DEFAULT_EMBEDDING_MODEL=BAAI/bge-m3
      - DEFAULT_RERANKER_MODEL=BAAI/bge-reranker-base
      - LOCAL_EMBEDDING_MODELS=BAAI/bge-m3
      - USE_LOCAL_EMBEDDINGS=true
      - USE_LOCAL_RERANKER=true
      - LOCAL_EMBEDDING_PROVIDER=tei
      - LOCAL_RERANKER_PROVIDER=tei
      - TEI_EMBEDDINGS_URL=http://tei-embed:80
      - TEI_RERANKER_URL=http://tei-rerank:80
      - LOCAL_EMBEDDING_BATCH_SIZE=64
      - GPU_EMBEDDING_BATCH_SIZE=100 # LLM API/servers may have strict/lower batch size limits
      - EMBEDDING_DEVICE=cpu
      - RERANKER_DEVICE=cpu
      - RERANK_TOP_K_MULTIPLIER=4
      - DEFAULT_TOKEN_BUDGET=8192
      - DEFAULT_MAX_ITERATIONS=10
      - MIN_MAX_ITERATIONS=1
      - MAX_MAX_ITERATIONS=30
      - MAX_CUSTOM_INSTRUCTIONS_CHARS=2000
      - MAX_SYSTEM_ROLE_CHARS=500
      - MAX_TOOL_INSTRUCTION_CHARS=500
      - INTENT_AGENT_MAX_ITERATIONS=1
      - MAX_ITERATIONS_SUFFICIENT_COVERAGE=2
      - MAX_ITERATIONS_PROBABLY_SUFFICIENT_COVERAGE=4
      - WEB_SEARCH_ITERATION_BONUS=2
      - FOCUSED_RERANK_THRESHOLD=0.1
      - BACKEND_URL=http://backend:8000
    env_file:
      - .env
    depends_on:
      - qdrant
      - tei-embed
      - tei-rerank
    volumes:
      - ./rag_service:/app
      - ./data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: [ "CMD", "sh", "-c", "curl -f http://localhost:8000/health && curl -f http://qdrant:6333/healthz" ]
      interval: 30s
      timeout: 10s
      retries: 3

  qdrant:
    image: qdrant/qdrant:v1.16
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  tei-embed:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    command:
      - --model-id
      - BAAI/bge-m3
    ports:
      - "8081:80"
    volumes:
      - tei_embed_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost/health" ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

  tei-rerank:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    platform: linux/amd64
    command:
      - --model-id
      - BAAI/bge-reranker-base
      - --max-concurrent-requests
      - "8"
      - --max-batch-tokens
      - "1024"
      - --max-batch-requests
      - "4"
      - --max-client-batch-size
      - "8"
      - --tokenization-workers
      - "1"
    ports:
      - "8082:80"
    volumes:
      - tei_rerank_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost/health" ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

volumes:
  qdrant_data:
  pdf_data:
  tei_embed_data:
  tei_rerank_data:
