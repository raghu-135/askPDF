version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_RAG_API_URL=http://localhost:8001
      - NEXT_PUBLIC_DEFAULT_EMBED_MODEL=BAAI/bge-m3
    depends_on:
      backend:
        condition: service_healthy
      rag-service:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - /app/node_modules
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - RAG_SERVICE_URL=http://rag-service:8000
      # Docling Tuning Options (Accuracy vs Speed)
      - DOCLING_DO_OCR=True # OCRs images/scans, preserves digital text.
      - DOCLING_DO_TABLE_STRUCTURE=True
      - DOCLING_TABLE_MODE=ACCURATE # ACCURATE is better for tables but slower.
      - DOCLING_FORCE_FULL_PAGE_OCR=False # KEEP FALSE for digital PDFs to avoid noise and degradation.
      - DOCLING_DO_FORMULA_ENRICHMENT=False
    depends_on:
      rag-service:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - pdf_data:/static
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s

  rag-service:
    build:
      context: .
      dockerfile: rag_service/Dockerfile
    ports:
      - "8001:8000"
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - DATA_DIR=/data
      - BACKEND_URL=http://backend:8000
      - DEFAULT_EMBEDDING_MODEL=BAAI/bge-m3
      - DEFAULT_RERANKER_MODEL=BAAI/bge-reranker-v2-m3
      - LOCAL_EMBEDDING_MODELS=BAAI/bge-m3
      - USE_LOCAL_EMBEDDINGS=true
      - USE_LOCAL_RERANKER=true
      - GPU_EMBEDDING_BATCH_SIZE=100 # LLM API/servers may have strict/lower batch size limits
      - EMBEDDING_DEVICE=cpu
      - RERANKER_DEVICE=cpu
      - EMBEDDING_MAX_LENGTH=0
      - RERANKER_MAX_LENGTH=0
      - ORT_INTRA_OP_NUM_THREADS=0
      - ORT_INTER_OP_NUM_THREADS=1
      - ORT_ENABLE_MEM_ARENA=true
      - ORT_ENABLE_MEM_PATTERN=true
      - RERANK_TOP_K_MULTIPLIER=4
      - DEFAULT_TOKEN_BUDGET=8192
      - DEFAULT_MAX_ITERATIONS=10
      - MIN_MAX_ITERATIONS=1
      - MAX_MAX_ITERATIONS=30
      - MAX_CUSTOM_INSTRUCTIONS_CHARS=2000
      - MAX_SYSTEM_ROLE_CHARS=500
      - MAX_TOOL_INSTRUCTION_CHARS=500
      - INTENT_AGENT_MAX_ITERATIONS=1
      - MAX_ITERATIONS_SUFFICIENT_COVERAGE=2
      - MAX_ITERATIONS_PROBABLY_SUFFICIENT_COVERAGE=4
      - WEB_SEARCH_ITERATION_BONUS=2
      - FOCUSED_RERANK_THRESHOLD=0.1
      - BACKEND_URL=http://backend:8000
    env_file:
      - .env
    depends_on:
      - qdrant
    volumes:
      - ./rag_service:/app
      - ./data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: [ "CMD", "sh", "-c", "curl -f http://localhost:8000/health && curl -f http://qdrant:6333/healthz" ]
      interval: 30s
      timeout: 10s
      retries: 3

  qdrant:
    image: qdrant/qdrant:v1.16
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data:
  pdf_data:
