version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    env_file:
      - .env
    depends_on:
      rag-service:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - frontend_next:/app/.next
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  rag-service:
    build:
      context: ./rag_service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=INFO
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgresql:5432/askpdf
      - TEST_DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgresql:5432/test_askpdf
      - POSTGRES_POOL_SIZE=10
      - POSTGRES_MAX_OVERFLOW=20
      - RAG_SUPABASE_DB_URL=${RAG_SUPABASE_DB_URL:-postgresql://postgres:postgres@supabase-db:5432/postgres}
      - WEAVIATE_URL=http://weaviate:8080
      - WEAVIATE_HYBRID_ALPHA=${WEAVIATE_HYBRID_ALPHA}
      - CAPTURE_SERVICE_URL=http://browser-capture:8080
    env_file:
      - .env
    depends_on:
      postgresql:
        condition: service_healthy
      weaviate:
        condition: service_healthy
    volumes:
      - ./rag_service:/app
      - ./supabase:/supabase:ro
      - ./data:/data
      - pdf_data:/static
      - browser_captures:/captures:ro  # Read access to browser captures
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: [ "CMD", "sh", "-c", "curl -f http://localhost:8000/health && curl -f http://weaviate:8080/v1/.well-known/ready" ]
      interval: 30s
      timeout: 10s
      retries: 3

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.36.2
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      - QUERY_DEFAULTS_LIMIT=${QUERY_DEFAULTS_LIMIT}
      - AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED=true
      - PERSISTENCE_DATA_PATH=/var/lib/weaviate
      - DEFAULT_VECTORIZER_MODULE=none
      - ENABLE_API_BASED_MODULES=true
      - CLUSTER_HOSTNAME=node1
    healthcheck:
      #test: [ "CMD", "curl", "-f", "http://localhost:8080/v1/.well-known/ready" ]
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/v1/.well-known/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - weaviate_data:/var/lib/weaviate

  postgresql:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: askpdf
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d askpdf"]
      interval: 5s
      timeout: 5s
      retries: 5

  browser-capture:
    build:
      context: ./browser_capture
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8090:3000"  # Browser web UI for iframe access (localhost only)
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      # CDP is loopback-only inside this container; rag-service talks to the capture API over Docker DNS.
      - BRAVE_CLI=--remote-debugging-address=127.0.0.1 --remote-debugging-port=9222 --no-first-run --no-default-browser-check
      - BROWSER_DEBUG_URL=127.0.0.1:9222
      - CUSTOM_PORT=3000
      # Enable Selkies clipboard functionality
      - SELKIES_CLIPBOARD_ENABLED=${SELKIES_CLIPBOARD_ENABLED}
      - SELKIES_CLIPBOARD_BRIDGE_ENABLED=${SELKIES_CLIPBOARD_BRIDGE_ENABLED}
      # Disable Selkies gaming features
      - SELKIES_GAMEPAD_ENABLED=${SELKIES_GAMEPAD_ENABLED}
      - SELKIES_UI_SIDEBAR_SHOW_GAMEPADS=${SELKIES_UI_SIDEBAR_SHOW_GAMEPADS}
      - SELKIES_UI_SIDEBAR_SHOW_GAMING_MODE=${SELKIES_UI_SIDEBAR_SHOW_GAMING_MODE}
      # Disable Selkies sharing features  
      - SELKIES_UI_SIDEBAR_SHOW_SHARING=${SELKIES_UI_SIDEBAR_SHOW_SHARING}
      # Disable Selkies apps features
      - SELKIES_UI_SIDEBAR_SHOW_APPS=${SELKIES_UI_SIDEBAR_SHOW_APPS}
    shm_size: '2gb'
    volumes:
      - browser_captures:/captures
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  frontend_next:
  weaviate_data:
  pdf_data:
  postgres_data:
  browser_captures:
