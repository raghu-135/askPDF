version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_DEFAULT_EMBED_MODEL=BAAI/bge-m3
    depends_on:
      rag-service:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - /app/node_modules
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  rag-service:
    build:
      context: .
      dockerfile: rag_service/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=INFO
      - WEAVIATE_URL=http://weaviate:8080
      - WEAVIATE_HYBRID_ALPHA=0.7
      - DATA_DIR=/data
      - CAPTURE_SERVICE_URL=http://browser-capture:8080
      - DEFAULT_EMBEDDING_MODEL=BAAI/bge-m3
      - DEFAULT_RERANKER_MODEL=BAAI/bge-reranker-v2-m3
      - LOCAL_EMBEDDING_MODELS=BAAI/bge-m3
      - USE_LOCAL_EMBEDDINGS=true
      - USE_LOCAL_RERANKER=true
      - EMBEDDING_DEVICE=cpu
      - RERANKER_DEVICE=cpu
      - RERANK_TOP_K_MULTIPLIER=6
      - DEFAULT_TOKEN_BUDGET=8192
      - DEFAULT_MAX_ITERATIONS=10
      - MIN_MAX_ITERATIONS=1
      - MAX_MAX_ITERATIONS=30
      - MAX_CUSTOM_INSTRUCTIONS_CHARS=2000
      - MAX_SYSTEM_ROLE_CHARS=500
      - MAX_TOOL_INSTRUCTION_CHARS=500
      - INTENT_AGENT_MAX_ITERATIONS=1
      - MAX_ITERATIONS_SUFFICIENT_COVERAGE=2
      - MAX_ITERATIONS_PROBABLY_SUFFICIENT_COVERAGE=4
      - WEB_SEARCH_ITERATION_BONUS=2
      # Docling Tuning Options (Accuracy vs Speed)
      - DOCLING_DO_OCR=True # OCRs images/scans, preserves digital text.
      - DOCLING_DO_TABLE_STRUCTURE=True
      - DOCLING_TABLE_MODE=ACCURATE # ACCURATE is better for tables but slower.
      - DOCLING_FORCE_FULL_PAGE_OCR=False # KEEP FALSE for digital PDFs to avoid noise and degradation.
      - DOCLING_DO_FORMULA_ENRICHMENT=False # use when you have formulas in your PDFs
      # Web capture extraction tuning
      - TRAFILATURA_INCLUDE_TABLES=True
      - TRAFILATURA_INCLUDE_IMAGES=True
      - TRAFILATURA_INCLUDE_LINKS=True
      - TRAFILATURA_INCLUDE_FORMATTING=True
      - TRAFILATURA_INCLUDE_COMMENTS=False
      - TRAFILATURA_DEDUPLICATE=False
      - TRAFILATURA_FAVOR_RECALL=True
      - TRAFILATURA_FAST=False
      # PostgreSQL configuration
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgresql:5432/askpdf
      - TEST_DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgresql:5432/test_askpdf
      - POSTGRES_POOL_SIZE=10
      - POSTGRES_MAX_OVERFLOW=20
    env_file:
      - .env
    depends_on:
      postgresql:
        condition: service_healthy
      weaviate:
        condition: service_healthy
    volumes:
      - ./rag_service:/app
      - ./data:/data
      - pdf_data:/static
      - browser_captures:/captures:ro  # Read access to browser captures
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: [ "CMD", "sh", "-c", "curl -f http://localhost:8000/health && curl -f http://weaviate:8080/v1/.well-known/ready" ]
      interval: 30s
      timeout: 10s
      retries: 3

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.36.2
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      - QUERY_DEFAULTS_LIMIT=20
      - AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED=true
      - PERSISTENCE_DATA_PATH=/var/lib/weaviate
      - DEFAULT_VECTORIZER_MODULE=none
      - ENABLE_API_BASED_MODULES=true
      - CLUSTER_HOSTNAME=node1
    healthcheck:
      #test: [ "CMD", "curl", "-f", "http://localhost:8080/v1/.well-known/ready" ]
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/v1/.well-known/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - weaviate_data:/var/lib/weaviate

  postgresql:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: askpdf
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d askpdf"]
      interval: 5s
      timeout: 5s
      retries: 5

  browser-capture:
    build:
      context: ./browser_capture
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8090:3000"  # Browser web UI for iframe access (localhost only)
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      # CDP is loopback-only inside this container; rag-service talks to the capture API over Docker DNS.
      - BRAVE_CLI=--remote-debugging-address=127.0.0.1 --remote-debugging-port=9222 --no-first-run --no-default-browser-check
      - BROWSER_DEBUG_URL=127.0.0.1:9222
      - CUSTOM_PORT=3000
      # Enable Selkies clipboard functionality
      - SELKIES_CLIPBOARD_ENABLED=true
      - SELKIES_CLIPBOARD_BRIDGE_ENABLED=true
      # Disable Selkies gaming features
      - SELKIES_GAMEPAD_ENABLED=false
      - SELKIES_UI_SIDEBAR_SHOW_GAMEPADS=false
      - SELKIES_UI_SIDEBAR_SHOW_GAMING_MODE=false
      # Disable Selkies sharing features  
      - SELKIES_UI_SIDEBAR_SHOW_SHARING=false
      # Disable Selkies apps features
      - SELKIES_UI_SIDEBAR_SHOW_APPS=false
    shm_size: '2gb'
    volumes:
      - browser_captures:/captures
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  weaviate_data:
  pdf_data:
  postgres_data:
  browser_captures:
